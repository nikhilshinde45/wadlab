<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Mobile UI | Home</title>
    
    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #1e293b;
        }

        body {
            font-family: 'Outfit', sans-serif !important;
            background-color: var(--bg) !important;
            color: var(--text) !important;
        }

        .ui-page {
            background: var(--bg) !important;
        }

        /* Premium Header */
        .ui-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark)) !important;
            border: none !important;
            padding: 15px 0 !important;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }

        .ui-header .ui-title {
            font-weight: 700 !important;
            font-size: 1.4rem !important;
            color: #ffffff !important;
            text-shadow: none !important;
            margin: 0 !important;
        }

        /* Navbar Styling */
        .ui-navbar ul {
            background: white !important;
        }

        .ui-navbar a {
            background: white !important;
            border: none !important;
            font-weight: 500 !important;
            color: #64748b !important;
            transition: all 0.3s ease;
            text-shadow: none !important;
            border-bottom: 3px solid transparent !important;
        }

        .ui-navbar a.ui-btn-active {
            background: white !important;
            color: var(--primary) !important;
            border-bottom: 3px solid var(--primary) !important;
            box-shadow: none !important;
        }

        /* Modern Card Layout */
        .hero-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            margin: 25px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-card h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 15px;
        }

        .hero-card p {
            font-size: 1.1rem;
            color: #64748b;
            line-height: 1.6;
        }

        .feature-badge {
            display: inline-block;
            background: #e0e7ff;
            color: var(--primary-dark);
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        /* Footer */
        .ui-footer {
            background: #1e293b !important;
            border: none !important;
            padding: 15px 0 !important;
            color: #94a3b8 !important;
            text-shadow: none !important;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .ui-footer h4 {
            font-weight: 400 !important;
            font-size: 0.9rem !important;
        }

        /* Remove default JQM styles */
        .ui-btn {
            text-shadow: none !important;
        }
    </style>

    <!-- jQuery and jQuery Mobile Scripts -->
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>

<div data-role="page" id="home">
    <div data-role="header">
        <h1>Assignment 4A</h1>
    </div>

    <div data-role="navbar">
        <ul>
            <li><a href="index.html" class="ui-btn-active" data-ajax="false">Home</a></li>
            <li><a href="about.html" data-transition="slide" data-ajax="false">About</a></li>
            <li><a href="register.html" data-transition="slide" data-ajax="false">Register</a></li>
        </ul>
    </div>

    <div role="main" class="ui-content">
        <div class="hero-card">
            <span class="feature-badge">Modern Mobile Web</span>
            <h2>Welcome Home</h2>
            <p>Experience a premium mobile interface built with jQuery Mobile and modern CSS refinements.</p>
            <p>Fluid transitions, refined typography, and a clean aesthetic designed for the modern web.</p>
        </div>
    </div>

    <div data-role="footer">
        <h4>Created with &hearts; for Assignment 4A</h4>
    </div>
</div>

</body>
</html>
