<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | BookHaven</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Header -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">Online Book Store</span>
  </div>
</nav>

<!-- Form -->
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="text-center mb-4">Create Account</h3>

          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" placeholder="example@email.com" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Mobile</label>
                <input type="tel" class="form-control" placeholder="10-digit number" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">City</label>
                <input type="text" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Date of Birth</label>
                <input type="date" class="form-control" required>
              </div>

              <div class="col-md-6">
                <label class="form-label">Gender</label>
                <div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender">
                    <label class="form-check-label">Male</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender">
                    <label class="form-check-label">Female</label>
                  </div>
                </div>
              </div>

              <div class="col-12">
                <label class="form-label">Address</label>
                <textarea class="form-control" rows="3"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label">Hobbies</label>
                <input type="text" class="form-control" placeholder="Comma separated">
              </div>

              <div class="col-12 text-center">
                <button class="btn btn-warning px-5">Sign Up Now</button>
              </div>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
  <p>© 2026 Online Book Store</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="validation.js"></script>

</body>
</html>
