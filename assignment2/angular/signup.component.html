<div class="container">
    <div class="form-wrapper">
        <h2>Signup Form</h2>
        <form id="signupForm" class="form">
            <div class="form-group">
                <label for="signupName">Full Name:</label>
                <input type="text" id="signupName" name="signupName" required>
            </div>

            <div class="form-group">
                <label for="signupEmail">Email:</label>
                <input type="email" id="signupEmail" name="signupEmail" required>
            </div>

            <div class="form-group">
                <label for="signupUsername">Username:</label>
                <input type="text" id="signupUsername" name="signupUsername" required>
            </div>

            <div class="form-group">
                <label for="signupPassword">Password:</label>
                <input type="password" id="signupPassword" name="signupPassword" required>
            </div>

            <div class="form-group">
                <label for="signupConfirmPassword">Confirm Password:</label>
                <input type="password" id="signupConfirmPassword" name="signupConfirmPassword" required>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="signupAgree" name="signupAgree" required>
                <label for="signupAgree">I agree to the terms and conditions</label>
            </div>

            <button type="submit" class="btn-submit">Signup</button>
        </form>

        <p class="link-text">Already have an account? <a href="#" onclick="switchToRegistration()">Register here</a></p>
    </div>
</div>
