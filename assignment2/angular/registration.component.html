<div class="container">
    <div class="form-wrapper">
        <h2>Registration Form</h2>
        <form id="registrationForm" class="form">
            <div class="form-group">
                <label for="regName">Full Name:</label>
                <input type="text" id="regName" name="regName" required>
            </div>

            <div class="form-group">
                <label for="regEmail">Email:</label>
                <input type="email" id="regEmail" name="regEmail" required>
            </div>

            <div class="form-group">
                <label for="regPhone">Phone Number:</label>
                <input type="tel" id="regPhone" name="regPhone" required>
            </div>

            <div class="form-group">
                <label for="regAddress">Address:</label>
                <textarea id="regAddress" name="regAddress" rows="3" required></textarea>
            </div>

            <div class="form-group">
                <label for="regPassword">Password:</label>
                <input type="password" id="regPassword" name="regPassword" required>
            </div>

            <div class="form-group">
                <label for="regConfirmPassword">Confirm Password:</label>
                <input type="password" id="regConfirmPassword" name="regConfirmPassword" required>
            </div>

            <button type="submit" class="btn-submit">Register</button>
        </form>

        <p class="link-text">Already have an account? <a href="#" onclick="switchToSignup()">Signup here</a></p>
    </div>
</div>
