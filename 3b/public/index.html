<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminNova - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="navbar">
        <div class="logo" style="margin: 0; font-size: 1.5rem;">
            <i class="fa-brands fa-node-js accent-text"></i>
            <span>Admin<span class="accent-text">Nova</span></span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link active">Home</a>
            <a href="users.html" class="nav-link">Users</a>
            <a href="create.html" class="nav-link">Create</a>
        </div>
    </nav>
    
    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-brands fa-node-js accent-text"></i>
                <h1>Admin<span class="accent-text">Nova</span></h1>
            </div>
            <p>Welcome to your premium user administration portal</p>
        </header>

        <main>
            <div class="dashboard-grid">
                <a href="users.html" class="dash-card">
                    <i class="fa-solid fa-users"></i>
                    <h3>View All Users</h3>
                    <p>Manage, edit, and delete existing users from the database.</p>
                </a>
                
                <a href="create.html" class="dash-card" style="border-color: rgba(16, 185, 129, 0.3);">
                    <i class="fa-solid fa-user-plus" style="color: var(--success);"></i>
                    <h3>Create New User</h3>
                    <p>Add a new record to the MongoDB database through the API.</p>
                </a>
            </div>
        </main>
    </div>
</body>
</html>
