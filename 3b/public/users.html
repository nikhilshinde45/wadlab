<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users - AdminNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="navbar">
        <a href="index.html" class="logo" style="margin: 0; font-size: 1.5rem;">
            <i class="fa-brands fa-node-js accent-text"></i>
            <span>Admin<span class="accent-text">Nova</span></span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="users.html" class="nav-link active">Users</a>
            <a href="create.html" class="nav-link">Create</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="glass-panel">
            <div class="panel-header">
                <h2>Registered Users</h2>
                <div>
                    <button class="btn btn-secondary" style="padding: 10px; display: inline-flex; margin-right: 10px;" id="refresh-btn" title="Refresh">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                    <a href="create.html" class="btn btn-primary" style="display: inline-flex; width: auto; padding: 10px 15px;">
                        <i class="fa-solid fa-plus"></i> Add New
                    </a>
                </div>
            </div>
            
            <div class="users-container" id="users-list">
                <!-- Users injected here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading users...</p>
                </div>
            </div>
        </div>
        <div id="toast-container"></div>
    </div>

    <script src="script-shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', fetchUsers);
        document.getElementById('refresh-btn').addEventListener('click', fetchUsers);

        async function fetchUsers() {
            const usersList = document.getElementById('users-list');
            usersList.innerHTML = `
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading users...</p>
                </div>
            `;
            
            try {
                const response = await fetch('/user');
                const users = await response.json();
                
                if (!Array.isArray(users) || users.length === 0) {
                    usersList.innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-users-slash"></i>
                            <p>No users found. Create one to get started.</p>
                        </div>
                    `;
                    return;
                }
                
                usersList.innerHTML = '';
                users.forEach(user => {
                    const initials = `${(user.firstName || '').charAt(0)}${(user.lastName || '').charAt(0)}`.toUpperCase() || 'U';
                    
                    const userCard = document.createElement('div');
                    userCard.className = 'user-card';
                    userCard.innerHTML = `
                        <div class="user-info">
                            <div class="user-avatar">${initials}</div>
                            <div class="user-details">
                                <h3>${user.firstName} ${user.lastName}</h3>
                                <p><i class="fa-regular fa-envelope"></i> ${user.email}</p>
                                <p><i class="fa-solid fa-phone"></i> ${user.phone || 'N/A'}</p>
                            </div>
                        </div>
                        <div class="user-actions">
                            <a href="update.html?id=${user._id}" class="action-btn edit-btn" title="Edit User">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                            <button class="action-btn delete-btn" onclick="deleteUser('${user._id}')" title="Delete User">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    `;
                    usersList.appendChild(userCard);
                });
            } catch (error) {
                showToast('Failed to fetch users', 'error');
                usersList.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <p>Failed to load data. Please try again.</p>
                    </div>
                `;
            }
        }

        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            
            try {
                const response = await fetch(`/user/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (response.ok) {
                    showToast('User deleted successfully');
                    fetchUsers();
                } else {
                    showToast(result.message || 'Failed to delete user', 'error');
                }
            } catch (error) {
                showToast('Network error occurred', 'error');
            }
        }
    </script>
</body>
</html>
