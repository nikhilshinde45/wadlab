<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update User - AdminNova</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav class="navbar">
        <a href="index.html" class="logo" style="margin: 0; font-size: 1.5rem;">
            <i class="fa-brands fa-node-js accent-text"></i>
            <span>Admin<span class="accent-text">Nova</span></span>
        </a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="users.html" class="nav-link">Users</a>
            <a href="create.html" class="nav-link">Create</a>
        </div>
    </nav>
    
    <div class="container center-container">
        <div class="glass-panel form-panel">
            <div class="panel-header">
                <h2>Update User Details</h2>
                <a href="users.html" class="btn-icon" title="Back to users list">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
            </div>
            
            <form id="update-form" style="display: none;">
                <input type="hidden" id="user-id">
                
                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="firstName" placeholder="First Name" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="lastName" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="text" id="phone" placeholder="Phone Number" required>
                </div>

                <div class="form-actions">
                    <a href="users.html" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary" id="submit-btn" style="background: #3b82f6;">Update User <i class="fa-solid fa-pen-nib"></i></button>
                </div>
            </form>
            
            <div id="loading-spinner" class="loading-state">
                <div class="spinner"></div>
                <p>Fetching user details...</p>
            </div>
        </div>
        <div id="toast-container"></div>
    </div>

    <script src="script-shared.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const userId = params.get('id');
            
            if (!userId) {
                showToast('No user ID provided. Redirecting...', 'error');
                setTimeout(() => { window.location.href = 'users.html'; }, 1500);
                return;
            }
            
            // Fetch User Details
            try {
                const response = await fetch(`/user/${userId}`);
                const user = await response.json();
                
                if (response.ok && user) {
                    document.getElementById('user-id').value = user._id;
                    document.getElementById('email').value = user.email;
                    document.getElementById('firstName').value = user.firstName;
                    document.getElementById('lastName').value = user.lastName;
                    document.getElementById('phone').value = user.phone || '';
                    
                    document.getElementById('loading-spinner').style.display = 'none';
                    document.getElementById('update-form').style.display = 'flex';
                } else {
                    showToast('Failed to load user details', 'error');
                }
            } catch (error) {
                showToast('Network error occurred', 'error');
            }
        });

        // Submit Form
        document.getElementById('update-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Updating...';
            
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;

            if (!validateEmail(email)) {
                showToast('Please enter a valid email address.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Update User <i class="fa-solid fa-pen-nib"></i>';
                return;
            }

            if (!validatePhone(phone)) {
                showToast('Please enter a valid 10-digit phone number.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Update User <i class="fa-solid fa-pen-nib"></i>';
                return;
            }

            const userId = document.getElementById('user-id').value;
            const userData = {
                email: email,
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                phone: phone
            };
            
            try {
                const response = await fetch(`/user/${userId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast('User updated successfully. Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'users.html';
                    }, 1500);
                } else {
                    showToast(result.message || 'Failed to update user', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Update User <i class="fa-solid fa-pen-nib"></i>';
                }
            } catch (error) {
                showToast('Network error occurred', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Update User <i class="fa-solid fa-pen-nib"></i>';
            }
        });
    </script>
</body>
</html>
